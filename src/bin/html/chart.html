<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Dynamic Chart</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0F0F0F;
        }
        .widget-wrapper {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<div class="widget-wrapper">
    <div class="tradingview-widget-container" id="tv-widget-container" style="height:100%;width:100%">
        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
        <div class="tradingview-widget-copyright">
            <a id="tv-copyright-link" href="https://www.tradingview.com/symbols/NASDAQ-AAPL/" rel="noopener nofollow" target="_blank">
                <span class="blue-text" id="tv-symbol-text">AAPL stock chart</span>
            </a> by TradingView
        </div>
    </div>
    </div>

<script type="text/javascript">
    // 1. ฟังก์ชันสำหรับดึงค่าจาก URL Parameter
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // 2. ดึงค่า symbol จาก URL (ถ้าไม่มีให้ใช้ 'NASDAQ:AAPL' เป็นค่าเริ่มต้น)
    let symbolFromUrl = getQueryParam('symbol');
    if (!symbolFromUrl) {
        symbolFromUrl = 'NASDAQ:AAPL'; 
    } else {
        // จัดการฟอร์แมตให้เป็นตัวพิมพ์ใหญ่ทั้งหมด
        symbolFromUrl = symbolFromUrl.toUpperCase();
    }

    // 3. อัปเดตข้อความและลิงก์ลิขสิทธิ์ด้านล่างให้ตรงกับหุ้นที่เลือก
    const cleanSymbol = symbolFromUrl.replace(':', '-');
    document.getElementById('tv-copyright-link').href = `https://www.tradingview.com/symbols/${cleanSymbol}/`;
    document.getElementById('tv-symbol-text').innerText = `${symbolFromUrl} chart`;

    // 4. สร้างการตั้งค่าโค้ด Widget แบบ Dynamic
    const widgetConfig = {
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "interval": "D",
        "locale": "en",
        "save_image": true,
        "style": "1",
        "symbol": symbolFromUrl, // ใส่ค่าที่ดึงมาจาก URL ตรงนี้
        "theme": "dark",
        "timezone": "Etc/UTC",
        "backgroundColor": "#0F0F0F",
        "gridColor": "rgba(242, 242, 242, 0.06)",
        "watchlist": [],
        "withdateranges": false,
        "compareSymbols": [],
        "studies": [],
        "autosize": true
    };

    // 5. สร้าง Script Element และยัด Config เข้าไป เพื่อโหลด Widget ทำงาน
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.innerHTML = JSON.stringify(widgetConfig);

    // ใส่ Script เข้าไปในคอนเทนเนอร์ของ TradingView
    document.getElementById('tv-widget-container').appendChild(script);
</script>

</body>
</html>
