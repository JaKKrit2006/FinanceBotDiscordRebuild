<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Widgets</title>
  <style>
    body {
      background: #0F0F0F;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 0px;
    }
    .widget-wrapper {
      width: 100%;
    }
    .chart-wrapper {
      width: 100%;
      height: 480px;
    }
  </style>
</head>
<body>

  <div class="widget-wrapper">
    <div class="tradingview-widget-container" id="tv-info-container">
      <div class="tradingview-widget-container__widget"></div>
    </div>
  </div>

  <div class="chart-wrapper">
    <div class="tradingview-widget-container" id="tv-overview-container" style="height: 100%;">
      <div class="tradingview-widget-container__widget" style="height: 100%;"></div>
    </div>
  </div>

<script type="text/javascript">
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    let symbolFromUrl = getQueryParam('symbol');
    if (!symbolFromUrl) {
        symbolFromUrl = 'NASDAQ:AAPL';
    } else {
        symbolFromUrl = symbolFromUrl.toUpperCase();
    }

    const symbolName = symbolFromUrl.split(':')[1] || symbolFromUrl;

    const infoConfig = {
        "symbol": symbolFromUrl,
        "colorTheme": "dark",
        "isTransparent": true,
        "locale": "en",
        "width": "100%"
    };

    const infoScript = document.createElement('script');
    infoScript.type = 'text/javascript';
    infoScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js';
    infoScript.async = true;
    infoScript.innerHTML = JSON.stringify(infoConfig);
    document.getElementById('tv-info-container').appendChild(infoScript);

    const overviewConfig = {
        "lineWidth": 2,
        "lineType": 0,
        "chartType": "area",
        "fontColor": "rgb(106, 109, 120)",
        "gridLineColor": "rgba(242, 242, 242, 0.06)",
        "volumeUpColor": "rgba(34, 171, 148, 0.5)",
        "volumeDownColor": "rgba(247, 82, 95, 0.5)",
        "backgroundColor": "#0F0F0F",
        "widgetFontColor": "#DBDBDB",
        "upColor": "#22ab94",
        "downColor": "#f7525f",
        "borderUpColor": "#22ab94",
        "borderDownColor": "#f7525f",
        "wickUpColor": "#22ab94",
        "wickDownColor": "#f7525f",
        "colorTheme": "dark",
        "isTransparent": true,
        "locale": "en",
        "chartOnly": true,
        "scalePosition": "right",
        "scaleMode": "Normal",
        "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
        "valuesTracking": "1",
        "changeMode": "price-and-percent",
        "symbols": [
            [symbolName, symbolFromUrl + "|1D"]
        ],
        "dateRanges": [
            "1d|1",
            "1m|30",
            "3m|60",
            "12m|1D",
            "60m|1W",
            "all|1M"
        ],
        "fontSize": "10",
        "headerFontSize": "medium",
        "autosize": true,
        "width": "100%",
        "height": "100%",
        "noTimeScale": false,
        "hideDateRanges": false,
        "hideMarketStatus": false,
        "hideSymbolLogo": false
    };

    const overviewScript = document.createElement('script');
    overviewScript.type = 'text/javascript';
    overviewScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js';
    overviewScript.async = true;
    overviewScript.innerHTML = JSON.stringify(overviewConfig);
    document.getElementById('tv-overview-container').appendChild(overviewScript);
</script>

</body>
</html>
